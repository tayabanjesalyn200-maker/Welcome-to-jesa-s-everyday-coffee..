<style>

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle, #00ffff 1.5px, transparent 1.5px),
    radial-gradient(circle, #0099ff 1.5px, transparent 1.5px),
    radial-gradient(circle, #bd00ff 1.5px, transparent 1.5px);
  background-size: 45px 45px;
  background-position: 0 0, 22px 22px, 12px 12px;
  animation: glitterMove 8s linear infinite;
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
}

body {
background-color:#0d1117;
font-family: 'Quicksand', sans-serif;
text-align: center;
margin: 0;
position: relative;
min-height: 100vh;
box-shadow: inset 0 0 150px 60px rgba(0, 183, 255, 0.4), inset 0 0 250px 100px rgba(189, 0, 255, 0.2);
animation: glowBg 3s infinite alternate ease-in-out;
}

h1 {
font-family: 'Quicksand', sans-serif;
font-weight: bold;
font-size: 2.5em;
color:#00ffff;
margin-top: 20px;
text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff, 0 0 30px #bd00ff, 0 0 40px #ff0080;
position: relative;
z-index: 1;
animation: textGlow 2s infinite alternate ease-in-out;
}

nav {
position: relative;
z-index: 1;
}

/* ✅ GAYA SA IBA: NAGPAPALIT KULAY AT UMIILAW */
nav a {
text-decoration: none;
color: #ffffff;
font-weight: bold;
margin: 10px;
padding: 8px 12px;
border-radius: 12px;
background-color: #1a1f2e;
border: 1px solid #ff0080;
transition: 0.3s;
position: relative;
z-index: 1;
animation: colorChangeGlow 1s infinite alternate ease-in-out;
}

nav a:hover {
background-color:#00ffff;
color:#0d1117;
box-shadow: 0 0 15px #00ffff,0 0 25px #0099ff
}

hr {
border: 1px solid #0099ff;
box-shadow: 0 0 10px #0099ff, 0 0 20px #bd00ff;
margin: 20px auto;
max-width: 80%;
position: relative;
z-index: 1;
}

.thankyou-box {
  width: 90%;
  max-width: 650px;
  margin: 40px auto;
  background-color:#1a1f2e !important;
  border: 2px solid #333333;
  border-radius:25px;
  padding:35px;
  animation: boxGlow 1.5s infinite alternate ease-in-out, bounce 1s infinite ease-in-out;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

.thankyou-box::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #00ffff, #0099ff, #bd00ff, #ff0080, #00ffff);
  border-radius: 25px;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.thankyou-box:hover {
transform: scale(1.02);
border-color: transparent;
box-shadow: 0 0 30px #00ffff, 0 0 60px #0099ff, 0 0 40px #bd00ff, 0 0 80px #ff0080;
}

.thankyou-box:hover::before {
  opacity: 1;
}

.thankyou-box h2 {
  color: #00ffff;
  font-size: 2.5rem;
  text-shadow: 0 0 15px #00ffff, 0 0 30px #ff0080;
  margin: 10px 0;
}

.thankyou-box p {
  font-size: 20px;
  line-height: 1.8;
  color: #ffffff;
  text-shadow: 0 0 8px #00ffff;
}

.video-container {
  width: 90%;
  max-width: 700px;
  margin: 30px auto 50px auto;
  position: relative;
  z-index: 1;
}

.video-container video {
  width: 100%;
  border-radius: 20px;
  border: 3px solid #00ffff;
  box-shadow: 0 0 30px rgba(0, 255, 255, 0.6), 0 0 50px rgba(255, 0, 128, 0.4);
  animation: cardGlow 1.5s infinite alternate ease-in-out;
}

@keyframes glitterMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(45px, 45px); }
}

@keyframes glowBg {
  from { box-shadow: inset 0 0 70px 30px rgba(0, 183, 255, 0.3); }
  to { box-shadow: inset 0 0 120px 60px rgba(0, 183, 255, 0.6); }
}

@keyframes textGlow {
  from { text-shadow: 0 0 10px #00ffff, 0 0 20px #0099ff; }
  to { text-shadow: 0 0 20px #00ffff, 0 0 40px #bd00ff, 0 0 60px #ff0080; }
}

@keyframes boxGlow {
  0% { box-shadow: 0 0 15px #00ffff, 0 0 30px #0099ff; }
  50% { box-shadow: 0 0 25px #bd00ff, 0 0 40px #ff0080; }
  100% { box-shadow: 0 0 18px #ff0080, 0 0 35px #00ffff; }
}

@keyframes colorChangeGlow {
  0% { 
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #0099ff;
  }
  25% { 
    color: #ff0080;
    text-shadow: 0 0 10px #ff0080, 0 0 20px #ff0080, 0 0 30px #bd00ff;
  }
  50% { 
    color: #bd00ff;
    text-shadow: 0 0 10px #bd00ff, 0 0 20px #bd00ff, 0 0 30px #0099ff;
  }
  75% { 
    color: #ffff00;
    text-shadow: 0 0 10px #ffff00, 0 0 20px #ff0080, 0 0 30px #ffffff;
  }
  100% { 
    color: #00ccff;
    text-shadow: 0 0 10px #00ccff, 0 0 20px #00ffff, 0 0 40px #ff0080;
  }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

</style>
</head>
